<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generator imagini (Gemini)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input { padding: 10px; min-width: 260px; }
    button { padding: 10px 14px; cursor: pointer; }
    img { max-width: 100%; height: auto; display: block; margin-top: 16px; }
    .status { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Generator imagini (Gemini)</h1>

  <div class="row">
    <input id="prompt" placeholder="Ex: cabană în munți la apus" />
    <button id="btn">Generează</button>
  </div>

  <div class="status" id="status"></div>
  <img id="img" alt="Imagine generată" />

  <script>
  const btn = document.getElementById("btn");
  const promptEl = document.getElementById("prompt");
  const statusEl = document.getElementById("status");
  const imgEl = document.getElementById("img");

  (function restoreFromCache() {
    try {
      const lastPrompt = localStorage.getItem("gemini_last_prompt");
      const lastImage = localStorage.getItem("gemini_last_image_dataurl");
      if (lastPrompt && lastImage) {
        promptEl.value = lastPrompt;
        imgEl.src = lastImage;
        statusEl.textContent = "Încărcat din cache ✅";
      }
    } catch (e) {
    }
  })();

  async function blobToDataURL(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  btn.addEventListener("click", async () => {
    const prompt = (promptEl.value || "").trim();
    if (!prompt) {
      statusEl.textContent = "Scrie un prompt.";
      return;
    }

    try {
      const lastPrompt = localStorage.getItem("gemini_last_prompt");
      const lastImage = localStorage.getItem("gemini_last_image_dataurl");
      if (lastPrompt === prompt && lastImage) {
        imgEl.src = lastImage;
        statusEl.textContent = "Din cache (același prompt) ✅";
        return;
      }
    } catch (e) {}

    statusEl.textContent = "Generez...";
    imgEl.removeAttribute("src");

    const url = `/.netlify/functions/generate-image?prompt=${encodeURIComponent(prompt)}`;

    try {
      const res = await fetch(url);

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        statusEl.textContent = err.error || `Eroare (${res.status})`;
        return;
      }

      const blob = await res.blob();
      const dataUrl = await blobToDataURL(blob);
      imgEl.src = dataUrl;

      try {
        localStorage.setItem("gemini_last_prompt", prompt);
        localStorage.setItem("gemini_last_image_dataurl", dataUrl);
      } catch (e) {
      }

      statusEl.textContent = "Gata ✅";
    } catch (e) {
      statusEl.textContent = "Eroare de rețea / funcție indisponibilă.";
    }
  });
</script>
</body>
</html>
